services:
  env-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  db:
    image: "docker.io/library/mysql:9.6"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
    expose:
      - "3306"
    volumes:
      - type: "volume"
        target: "/var/lib/mysql"
        source: "temasek-data"
        read_only: false
    networks:
      - "aspire"
  temasek-webapi:
    image: "${TEMASEK_WEBAPI_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${TEMASEK_WEBAPI_PORT}"
      ConnectionStrings__temasek: "Server=db;Port=3306;User ID=root;Password=${DB_PASSWORD};Database=temasek"
      TEMASEK_HOST: "db"
      TEMASEK_PORT: "3306"
      TEMASEK_USERNAME: "root"
      TEMASEK_PASSWORD: "${DB_PASSWORD}"
      TEMASEK_URI: "mysql://root:${DB_PASSWORD}@db:3306/temasek"
      TEMASEK_JDBCCONNECTIONSTRING: "jdbc:mysql://db:3306/temasek"
      TEMASEK_DATABASENAME: "temasek"
      FormSg:CallbackApiKey: "${FORMSG_CALLBACK_API_KEY}"
      FormSg:SecretKey: "${FORMSG_SECRET_KEY}"
      Clerk:SecretKey: "${CLERK_SECRET_KEY}"
      Clerk:AuthorizedParties: "${CLERK_AUTHORIZED_PARTIES}"
      Calendarr:Enabled: "${CALENDARR_ENABLED}"
      Calendarr:ServiceAccountJsonCredential: "${CALENDARR_SERVICE_ACCOUNT_JSON_CREDENTIAL}"
      Calendarr:SyncParentCalendarId: "${CALENDARR_SYNC_PARENT_CALENDAR_ID}"
      Calendarr:SyncChildCalendarId: "${CALENDARR_SYNC_CHILD_CALENDAR_ID}"
      Calendarr:SyncInterval: "${CALENDARR_SYNC_INTERVAL}"
      Calendarr:BdeComdSourceCalendarId: "${CALENDARR_BDE_COMD_SOURCE_CALENDAR_ID}"
      Calendarr:BdeComdTargetCalendarId: "${CALENDARR_BDE_COMD_TARGET_CALENDAR_ID}"
      Calendarr:BdeComdSyncInterval: "${CALENDARR_BDE_COMD_SYNC_INTERVAL}"
      Facilities:Enabled: "${FACILITIES_ENABLED}"
      Facilities:ServiceAccountJsonCredential: "${FACILITIES_SERVICE_ACCOUNT_JSON_CREDENTIAL}"
      Facilities:CalendarId: "${FACILITIES_CALENDAR_ID}"
      Facilities:CarbonCopyCalendarId: "${FACILITIES_CARBON_COPY_CALENDAR_ID}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://env-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "temasek-webapi"
    expose:
      - "${TEMASEK_WEBAPI_PORT}"
    depends_on:
      db:
        condition: "service_started"
    networks:
      - "aspire"
  temasek-webapp:
    image: "${TEMASEK_WEBAPP_IMAGE}"
    environment:
      NODE_ENV: "production"
      PORT: "8000"
      TEMASEK_WEBAPI_HTTP: "http://temasek-webapi:${TEMASEK_WEBAPI_PORT}"
      services__temasek-webapi__http__0: "http://temasek-webapi:${TEMASEK_WEBAPI_PORT}"
      TEMASEK_WEBAPI_HTTPS: "https://temasek-webapi:${TEMASEK_WEBAPI_PORT}"
      NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "${CLERK_PUBLISHABLE_KEY}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://env-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "temasek-webapp"
    expose:
      - "8000"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  temasek-data:
    driver: "local"
