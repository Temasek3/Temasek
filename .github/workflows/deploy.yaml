name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  APP_NAME: "temasek-webapi"
  SERVICE_NAME: "temasek-webapi"
  REMOTE_ROOT: "/opt/temasek-webapi"
  RELEASES_TO_KEEP: "10"
  SERVER_PORT: "22"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 11.0.x

      - name: Compute release id
        id: meta
        shell: pwsh
        run: |
          $dateStr = (Get-Date).ToUniversalTime().ToString("yyyyMMddHHmmss")
          $sha = $env:GITHUB_SHA.Substring(0, 7)
          "release_id=${dateStr}-${sha}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish ./Temasek.WebApi `
            -c Release `
            -o "${{ github.workspace }}/publish"

      - name: Create release bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Path "Caddyfile" -Destination "${{ github.workspace }}/publish/"
          tar -C "${{ github.workspace }}/publish" `
            -czf "dist/$env:APP_NAME-${{ steps.meta.outputs.release_id }}.tar.gz" .

      - name: Configure SSH
        shell: pwsh
        env:
          SERVER_HOST: ${{ secrets.HOST }}
          SERVER_USER: ${{ secrets.USERNAME }}
          SERVER_SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          $sshDir = Join-Path $HOME ".ssh"
          New-Item -ItemType Directory -Force -Path $sshDir | Out-Null
          chmod 700 $sshDir
          [IO.File]::WriteAllText("$sshDir/id_ed25519", "$env:SERVER_SSH_KEY`n")
          chmod 600 "$sshDir/id_ed25519"
          ssh-keyscan -p $env:SERVER_PORT -H $env:SERVER_HOST >> "$sshDir/known_hosts"

      - name: Upload release bundle
        shell: pwsh
        env:
          SERVER_HOST: ${{ secrets.HOST }}
          SERVER_USER: ${{ secrets.USERNAME }}
          RELEASE_ID: ${{ steps.meta.outputs.release_id }}
        run: |
          scp -P $env:SERVER_PORT `
            "dist/$env:APP_NAME-$env:RELEASE_ID.tar.gz" `
            "$env:SERVER_USER@${env:SERVER_HOST}:/tmp/$env:APP_NAME-$env:RELEASE_ID.tar.gz"

      - name: Activate release
        shell: pwsh
        env:
          SERVER_HOST: ${{ secrets.HOST }}
          SERVER_USER: ${{ secrets.USERNAME }}
          RELEASE_ID: ${{ steps.meta.outputs.release_id }}
        run: |
          $remoteScript = @"
          set -euo pipefail

          APP_NAME="$env:APP_NAME"
          SERVICE_NAME="$env:SERVICE_NAME"
          REMOTE_ROOT="$env:REMOTE_ROOT"
          RELEASES_TO_KEEP="$env:RELEASES_TO_KEEP"
          RELEASE_ID="$env:RELEASE_ID"
          BUNDLE="/tmp/`${APP_NAME}-`${RELEASE_ID}.tar.gz"
          RELEASE_DIR="`${REMOTE_ROOT}/releases/`${RELEASE_ID}"

          sudo mkdir -p "`${REMOTE_ROOT}/releases"
          sudo rm -rf "`${RELEASE_DIR}"
          sudo mkdir -p "`${RELEASE_DIR}"

          sudo tar -xzf "`${BUNDLE}" -C "`${RELEASE_DIR}"
          sudo chown -R root:root "`${RELEASE_DIR}"
          sudo find "`${RELEASE_DIR}" -type d -exec chmod 755 {} \;
          sudo find "`${RELEASE_DIR}" -type f -exec chmod 644 {} \;

          if [ -f "`${RELEASE_DIR}/`${APP_NAME}" ]; then
            sudo chmod 755 "`${RELEASE_DIR}/`${APP_NAME}"
          fi

          if [ -f "`${RELEASE_DIR}/Caddyfile" ]; then
            sudo cp "`${RELEASE_DIR}/Caddyfile" /etc/caddy/Caddyfile
            sudo systemctl reload caddy
          fi

          sudo ln -sfn "`${RELEASE_DIR}" "`${REMOTE_ROOT}/current"
          sudo systemctl daemon-reload
          sudo systemctl restart "`${SERVICE_NAME}"
          sudo systemctl is-active --quiet "`${SERVICE_NAME}"

          sudo rm -f "`${BUNDLE}"

          mapfile -t old_releases < <(sudo ls -1dt "`${REMOTE_ROOT}"/releases/* 2>/dev/null | tail -n "+`$((RELEASES_TO_KEEP + 1))" || true)
          if [ "`${#old_releases[@]}" -gt 0 ]; then
            sudo rm -rf "`${old_releases[@]}"
          fi
          "@

          $remoteScript | ssh -p $env:SERVER_PORT "$env:SERVER_USER@$env:SERVER_HOST" bash

      - name: Show running version
        shell: pwsh
        env:
          SERVER_HOST: ${{ secrets.HOST }}
          SERVER_USER: ${{ secrets.USERNAME }}
        run: |
          ssh -p $env:SERVER_PORT "$env:SERVER_USER@$env:SERVER_HOST" `
            "readlink -f $env:REMOTE_ROOT/current && sudo systemctl status $env:SERVICE_NAME --no-pager --lines=20"
