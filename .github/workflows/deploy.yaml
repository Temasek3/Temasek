name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  APP_NAME: "temasek-webapi"
  SERVICE_NAME: "temasek-webapi"
  REMOTE_ROOT: "/opt/temasek-webapi"
  RELEASES_TO_KEEP: "10"
  SERVER_PORT: "22"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 11.0.x

      - name: Compute release id
        id: meta
        shell: bash
        run: |
          echo "release_id=$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Publish app
        shell: bash
        run: |
          dotnet publish ./Temasek.WebApi \
            -c Release \
            -o "${{ github.workspace }}/publish"

      - name: Create release bundle
        shell: bash
        run: |
          mkdir -p dist
          tar -C "${{ github.workspace }}/publish" \
            -czf "dist/${APP_NAME}-${{ steps.meta.outputs.release_id }}.tar.gz" .

      - name: Configure SSH
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.HOST }}
          SERVER_USER: ${{ secrets.USERNAME }}
          SERVER_SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SERVER_PORT}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Upload release bundle
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.HOST }}
          SERVER_USER: ${{ secrets.USERNAME }}
          RELEASE_ID: ${{ steps.meta.outputs.release_id }}
        run: |
          scp -P "${SERVER_PORT}" \
            "dist/${APP_NAME}-${RELEASE_ID}.tar.gz" \
            "${SERVER_USER}@${SERVER_HOST}:/tmp/${APP_NAME}-${RELEASE_ID}.tar.gz"

      - name: Activate release
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.HOST }}
          SERVER_USER: ${{ secrets.USERNAME }}
          RELEASE_ID: ${{ steps.meta.outputs.release_id }}
        run: |
          ssh -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" <<EOF
          set -euo pipefail

          APP_NAME="${APP_NAME}"
          SERVICE_NAME="${SERVICE_NAME}"
          REMOTE_ROOT="${REMOTE_ROOT}"
          RELEASES_TO_KEEP="${RELEASES_TO_KEEP}"
          RELEASE_ID="${RELEASE_ID}"
          BUNDLE="/tmp/\${APP_NAME}-\${RELEASE_ID}.tar.gz"
          RELEASE_DIR="\${REMOTE_ROOT}/releases/\${RELEASE_ID}"

          sudo mkdir -p "\${REMOTE_ROOT}/releases"
          sudo rm -rf "\${RELEASE_DIR}"
          sudo mkdir -p "\${RELEASE_DIR}"

          sudo tar -xzf "\${BUNDLE}" -C "\${RELEASE_DIR}"
          sudo chown -R root:root "\${RELEASE_DIR}"
          sudo find "\${RELEASE_DIR}" -type d -exec chmod 755 {} \;
          sudo find "\${RELEASE_DIR}" -type f -exec chmod 644 {} \;

          if [ -f "\${RELEASE_DIR}/\${APP_NAME}" ]; then
            sudo chmod 755 "\${RELEASE_DIR}/\${APP_NAME}"
          fi

          sudo ln -sfn "\${RELEASE_DIR}" "\${REMOTE_ROOT}/current"
          sudo systemctl daemon-reload
          sudo systemctl restart "\${SERVICE_NAME}"
          sudo systemctl is-active --quiet "\${SERVICE_NAME}"

          sudo rm -f "\${BUNDLE}"

          mapfile -t old_releases < <(sudo ls -1dt "\${REMOTE_ROOT}"/releases/* 2>/dev/null | tail -n "+$((RELEASES_TO_KEEP + 1))" || true)
          if [ "\${#old_releases[@]}" -gt 0 ]; then
            sudo rm -rf "\${old_releases[@]}"
          fi
          EOF

      - name: Show running version
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.HOST }}
          SERVER_USER: ${{ secrets.USERNAME }}
        run: |
          ssh -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "readlink -f ${REMOTE_ROOT}/current && sudo systemctl status ${SERVICE_NAME} --no-pager --lines=20"
